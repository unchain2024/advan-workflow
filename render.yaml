services:
  # バックエンドAPI + フロントエンド統合デプロイ
  - type: web
    name: advan-workflow
    env: python
    region: oregon  # または singapore (アジア最寄り)
    plan: starter
    disk:
      name: advan-data
      mountPath: /data
      sizeGB: 1
    buildCommand: "pip install -r requirements.txt && cd frontend-react && npm ci && npm run build"
    startCommand: "python -m uvicorn backend-api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_PATH
        value: /data/monthly_items.db
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11"

      # 抽出器バックエンド (claude / gemini)
      - key: EXTRACTOR_BACKEND
        value: "claude"

      # Claude API（主バックエンド・OCR精度97.3%）
      - key: ANTHROPIC_API_KEY
        sync: false  # Render Dashboardで手動設定
      - key: CLAUDE_MODEL
        value: "claude-sonnet-4-6"
      - key: LLM_MODEL
        value: "claude-sonnet-4-20250514"  # 旧設定（未使用・後方互換のため残置）

      # Gemini API（フォールバック）
      - key: GEMINI_API_KEY
        sync: false  # Render Dashboardで手動設定
      - key: GEMINI_MODEL
        value: "gemini-3-flash-preview"
      # 注: Google Sheets 関連の env は廃止（シート脱却済み・DB単独運用）
